<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة المعلم</title>

<link href="https://fonts.googleapis.com/css2?family=Calibri:wght@400;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

<style>
body{font-family:Calibri;background:#eef2f7;margin:0}
.header{background:#1976d2;color:#fff;text-align:center;padding:15px}
.container{max-width:1000px;margin:20px auto}
.box{background:#fff;padding:20px;border-radius:12px;margin-bottom:15px}
select,input{width:100%;padding:8px;margin-top:5px}
button{padding:10px;border:none;border-radius:8px;background:#1976d2;color:#fff;cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ccc;padding:6px;text-align:center}
</style>
</head>

<body>

<div class="header">
<h2>لوحة المعلم</h2>
</div>

<div class="container">

<div class="box">
<select id="sel_grade"></select>
<select id="sel_section"></select>
<select id="sel_subject"></select>

<select id="sel_type">
<option value="term1">فترة أولى</option>
<option value="term2">فترة ثانية</option>
</select>

<button onclick="loadStudents()">تحميل</button>
</div>

<div class="box">
<table id="table" style="display:none">
<thead>
<tr><th>الكود</th><th>الاسم</th><th>الدرجة</th></tr>
</thead>
<tbody id="body"></tbody>
</table>

<button onclick="saveMarks()">حفظ</button>
</div>

</div>

<script>
var firebaseConfig={
apiKey:"AIzaSyA...",
authDomain:"results2026-7c0dd.firebaseapp.com",
projectId:"results2026-7c0dd"
};
firebase.initializeApp(firebaseConfig);
var db=firebase.firestore();

let assignments=[];

async function loadTeacher(){
let email=localStorage.getItem("currentUserEmail");
let doc=await db.collection("teachers").doc(email).get();
let t=doc.data();

assignments=t.assignments||[];

let grades=[...new Set(assignments.map(a=>a.grade))];
let sections=[...new Set(assignments.map(a=>a.section))];
let subs=[...new Set(assignments.map(a=>a.subject))];

grades.forEach(x=>sel_grade.innerHTML+=`<option>${x}</option>`);
sections.forEach(x=>sel_section.innerHTML+=`<option>${x}</option>`);
subs.forEach(x=>sel_subject.innerHTML+=`<option>${x}</option>`);
}

async function loadStudents(){

let grade=sel_grade.value;
let section=sel_section.value;
let subject=sel_subject.value;
let type=sel_type.value;

let snap=await db.collection("students")
.where("grade","==",grade)
.where("section","==",section).get();

body.innerHTML="";

snap.forEach(doc=>{
let s=doc.data();
let sub=s.subjects?.[subject];

let val=sub?.[type] ?? sub?.mark ?? "";

let tr=document.createElement("tr");
tr.innerHTML=`
<td>${s.code}</td>
<td>${s.name}</td>
<td><input data-code="${s.code}" value="${val}"></td>
`;
body.appendChild(tr);
});

table.style.display="table";
}

async function saveMarks(){

let inputs=document.querySelectorAll("#body input");
let type=sel_type.value;

let batch=db.batch();

inputs.forEach(inp=>{
let code=inp.dataset.code;
let mark=+inp.value||0;
let subject=sel_subject.value;

let ref=db.collection("students").doc(code);

let data={};

// 🔥 الجديد
data[`subjects.${subject}.${type}`]=mark;

// 🔥 القديم (backup)
data[`subjects.${subject}.mark`]=mark;

batch.update(ref,data);
});

await batch.commit();

alert("تم الحفظ");
loadStudents();
}

loadTeacher();
</script>

</body>
</html>
