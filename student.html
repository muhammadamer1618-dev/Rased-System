<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نتيجة الطالب</title>

<link href="https://fonts.googleapis.com/css2?family=Calibri:wght@400;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

<style>
body{font-family:Calibri;background:#f4f4f4;margin:0;padding:20px}
.container{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:12px}
h1{text-align:center;color:#1976d2}
h2{text-align:center;color:#d32f2f}
input{padding:10px;width:200px}
button{padding:10px;background:#1976d2;color:#fff;border:none;border-radius:8px}

table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #888;padding:8px;text-align:center}
th{background:#1976d2;color:#fff}
</style>
</head>

<body>

<div class="container">

<div style="text-align:center">
<input id="code">
<button onclick="loadStudent()">عرض</button>
</div>

<h1>مدارس الفلاح</h1>
<h2 id="exam_type"></h2>

<table id="table" style="display:none">
<thead>
<tr>
<th>المادة</th>
<th>درجة الطالب</th>
<th>النسبة</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

</div>

<script>
var firebaseConfig={
apiKey:"AIzaSyA...",
authDomain:"results2026-7c0dd.firebaseapp.com",
projectId:"results2026-7c0dd"
};
firebase.initializeApp(firebaseConfig);
var db=firebase.firestore();

function avg(obj){
let v=Object.values(obj||{});
if(!v.length) return 0;
return v.reduce((a,b)=>a+b,0)/v.length;
}

async function loadStudent(){

let code=document.getElementById("code").value.trim();
if(!code) return;

let doc=await db.collection("students").doc(code).get();
if(!doc.exists){alert("مش موجود");return;}

let d=doc.data();

// 🔥 نوع العرض
let s=await db.collection("settings").doc("general").get();
let type=s.exists?s.data().examType:"term1";

exam_type.innerText=type;

body.innerHTML="";

let total=0;
let count=0;

Object.keys(d.subjects||{}).forEach(subName=>{

let sub=d.subjects[subName];

let mark=0;

// 🔥 fallback
if(type==="term1"){
mark=sub.term1 ?? sub.mark ?? 0;
}
else if(type==="term2"){
mark=sub.term2 ?? sub.mark ?? 0;
}
else if(type==="quiz"){
mark=avg(sub.quizzes);
}

total+=mark;
count++;

let percent=mark;

let tr=document.createElement("tr");
tr.innerHTML=`
<td>${subName}</td>
<td>${mark}</td>
<td>${percent}%</td>
`;
body.appendChild(tr);

});

table.style.display="table";

}
</script>

</body>
</html>
