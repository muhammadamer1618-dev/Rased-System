<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة المشرف - نظام راصد</title>

<link href="https://fonts.googleapis.com/css2?family=Calibri:wght@400;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{font-family:Calibri;background:#eef2f7;margin:0}

.header{
  background:#1976d2;color:#fff;text-align:center;padding:15px;
}
.header h1{margin:0}
.header h2{margin:5px 0 0;color:#ffeb3b}

.container{max-width:1100px;margin:25px auto}

.box{
  background:#fff;border-radius:14px;padding:20px;margin-bottom:18px;
}

h3{
  color:#1976d2;
  border-right:4px solid #1976d2;
  padding-right:8px;
}

button{
  padding:8px 15px;border:none;border-radius:8px;
  cursor:pointer;font-weight:bold
}

.btn-primary{background:#1976d2;color:#fff}
.btn-secondary{background:#757575;color:#fff}

table{width:100%;border-collapse:collapse;margin-top:12px}
th,td{border:1px solid #ccc;text-align:center;padding:6px}
th{background:#1976d2;color:#fff}

select{width:100%;padding:6px}

/* 🔥 الطباعة */
@media print {

  body * {
    visibility: hidden;
  }

  #printArea, #printArea * {
    visibility: visible;
  }

  #printArea {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
  }

  @page {
    size: A4;
    margin: 10mm;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>مدارس الفلاح الأهلية</h1>
  <h2>لوحة المشرف</h2>
</div>

<div class="container">

  <div class="box">
    <button class="btn-secondary" onclick="window.print()">طباعة</button>
    <button class="btn-primary" onclick="exportPDF()">PDF</button>
  </div>

  <!-- المعلمين -->
  <div class="box">
    <h3>المعلمون</h3>
    <table>
      <thead>
        <tr>
          <th>المعلم</th>
          <th>اختيار الفصل</th>
        </tr>
      </thead>
      <tbody id="sup_teachers_body"></tbody>
    </table>
  </div>

  <!-- 🔥 منطقة الطباعة فقط -->
  <div id="printArea" class="box">

    <h2 id="printTitle" style="text-align:center"></h2>

    <table id="sup_students_table" style="display:none">
      <thead>
        <tr>
          <th>كود</th>
          <th>اسم الطالب</th>
          <th>الصف</th>
          <th>الشعبة</th>
          <th>الدرجة</th>
        </tr>
      </thead>
      <tbody id="sup_students_body"></tbody>
    </table>

  </div>

</div>

<script>
var firebaseConfig={
  apiKey:"AIzaSyAfgSV-6_IMkXncgPWxY69omKfvFtGakgk",
  authDomain:"results2026-7c0dd.firebaseapp.com",
  projectId:"results2026-7c0dd"
};
firebase.initializeApp(firebaseConfig);
var db=firebase.firestore();

let teachersMap={};

async function loadTeachers(){
  let snap=await db.collection("teachers").get();
  let body=document.getElementById("sup_teachers_body");

  snap.forEach(doc=>{
    let t=doc.data();
    teachersMap[t.email]=t;

    let options="";
    (t.assignments||[]).forEach((a,i)=>{
      options+=`<option value="${t.email}|${i}">
        ${a.grade} - ${a.section} - ${a.subject}
      </option>`;
    });

    let tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${t.name}</td>
      <td>
        <select onchange="selectClass(this.value)">
          <option>اختر</option>
          ${options}
        </select>
      </td>`;
    body.appendChild(tr);
  });
}

function selectClass(val){
  if(!val) return;

  let [email, idx]=val.split("|");
  idx=parseInt(idx);

  let assign=teachersMap[email].assignments[idx];
  loadStudents(assign);
}

async function loadStudents(assign){

  let title = `${assign.grade} - ${assign.section} - ${assign.subject}`;
  document.getElementById("printTitle").innerText = "نتائج الطلاب - " + title;

  let table=document.getElementById("sup_students_table");
  let body=document.getElementById("sup_students_body");

  body.innerHTML="";
  table.style.display="none";

  let q=db.collection("students")
    .where("grade","==",assign.grade)
    .where("section","==",assign.section);

  let snap=await q.get();

  snap.forEach(doc=>{
    let s=doc.data();

    let mark = s.subjects?.[assign.subject]?.mark || 0;

    let tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${s.code}</td>
      <td>${s.name}</td>
      <td>${s.grade}</td>
      <td>${s.section}</td>
      <td>${mark}</td>`;
    body.appendChild(tr);
  });

  table.style.display="table";
}

function exportPDF(){
  let element = document.getElementById("printArea");

  html2pdf().from(element).set({
    margin:10,
    filename:"results.pdf",
    html2canvas:{scale:2},
    jsPDF:{unit:"mm",format:"a4"}
  }).save();
}

loadTeachers();
</script>

</body>
</html>
