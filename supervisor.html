<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة المشرف</title>

<link href="https://fonts.googleapis.com/css2?family=Calibri:wght@400;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

<style>
body{font-family:Calibri;background:#eef2f7;margin:0}
.header{background:#1976d2;color:#fff;text-align:center;padding:15px}
.container{max-width:1100px;margin:25px auto}
.box{background:#fff;border-radius:14px;padding:20px;margin-bottom:15px}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ccc;padding:6px;text-align:center}
th{background:#1976d2;color:#fff}
select{width:100%;padding:6px}
button{padding:8px;background:#1976d2;color:#fff;border:none;border-radius:8px}
</style>
</head>

<body>

<div class="header">
<h2>لوحة المشرف</h2>
</div>

<div class="container">

<div class="box">
<span id="sup_name"></span> |
<span id="sup_email"></span>
</div>

<div class="box">
<table>
<thead>
<tr>
<th>المعلم</th>
<th>الفصل</th>
</tr>
</thead>
<tbody id="teachers_body"></tbody>
</table>
</div>

<div class="box">

<span id="title"></span>

<table id="students_table" style="display:none">
<thead>
<tr>
<th>الكود</th>
<th>الاسم</th>
<th>الدرجة</th>
</tr>
</thead>
<tbody id="students_body"></tbody>
</table>

</div>

</div>

<script>
var firebaseConfig={
apiKey:"AIzaSyA...",
authDomain:"results2026-7c0dd.firebaseapp.com",
projectId:"results2026-7c0dd"
};
firebase.initializeApp(firebaseConfig);
var db=firebase.firestore();

let teachersMap={};
let currentTitle="";

/* 🔥 helper */
function avg(obj){
let v=Object.values(obj||{});
if(!v.length) return 0;
return v.reduce((a,b)=>a+b,0)/v.length;
}

async function getType(){
let d=await db.collection("settings").doc("general").get();
return d.exists?d.data().examType:"term1";
}

async function load(){

let email=localStorage.getItem("currentUserEmail");

let doc=await db.collection("supervisors").doc(email).get();
let data=doc.data();

sup_name.innerText=data.name;
sup_email.innerText=data.email;

let body=teachers_body;

for(let tEmail of data.teachers){

let tDoc=await db.collection("teachers").doc(tEmail).get();
let t=tDoc.data();

teachersMap[tEmail]=t;

let options="";
(t.assignments||[]).forEach((a,i)=>{
options+=`<option value="${tEmail}|${i}">
${a.grade} - ${a.section} - ${a.subject}
</option>`;
});

let tr=document.createElement("tr");
tr.innerHTML=`
<td>${t.name}</td>
<td>
<select onchange="selectClass(this.value)">
<option>اختر</option>
${options}
</select>
</td>`;
body.appendChild(tr);

}
}

function selectClass(v){

let [email,i]=v.split("|");

let t=teachersMap[email];
let a=t.assignments[i];

currentTitle=`${a.grade} - ${a.section} - ${a.subject}`;

loadStudents(a);
}

async function loadStudents(a){

title.innerText=currentTitle;

let type=await getType();

students_body.innerHTML="";

let snap=await db.collection("students")
.where("grade","==",a.grade)
.where("section","==",a.section)
.get();

snap.forEach(doc=>{

let s=doc.data();
let sub=s.subjects?.[a.subject];

let mark=0;

// 🔥 fallback
if(type==="term1"){
mark=sub?.term1 ?? sub?.mark ?? 0;
}
else if(type==="term2"){
mark=sub?.term2 ?? sub?.mark ?? 0;
}
else if(type==="quiz"){
mark=avg(sub?.quizzes);
}

let tr=document.createElement("tr");
tr.innerHTML=`
<td>${s.code}</td>
<td>${s.name}</td>
<td>${Math.round(mark)}</td>
`;

students_body.appendChild(tr);

});

students_table.style.display="table";

}

load();
</script>

</body>
</html>
