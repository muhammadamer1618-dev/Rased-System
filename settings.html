<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إعداد المواد ونوع الاختبار - مدارس الفلاح الأهلية</title>

<link href="https://fonts.googleapis.com/css2?family=Calibri:wght@400;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

<style>
/* نفس التصميم */
body{font-family:Calibri;background:#f4f4f4;margin:0}
.header{background:#1976d2;color:#fff;text-align:center;padding:15px}
.header h2{color:#ffeb3b}
.container{max-width:1100px;margin:20px auto;padding:10px}
.box{background:#fff;border-radius:10px;padding:15px;margin-bottom:15px;box-shadow:0 0 8px rgba(0,0,0,0.1)}
h3{color:#1976d2}
input,select,button{font-family:Calibri;padding:7px;border-radius:6px;border:1px solid #999}
button{cursor:pointer;font-weight:bold;border:none}
.btn-primary{background:#1976d2;color:#fff}
.btn-secondary{background:#757575;color:#fff}
.btn-danger{background:#d32f2f;color:#fff}
.row{display:flex;flex-wrap:wrap;gap:10px}
.col-3{flex:1 1 23%}
.col-6{flex:1 1 48%}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ccc;text-align:center;padding:6px}
th{background:#1976d2;color:#fff}
.badge{padding:4px;background:#e3f2fd;color:#0d47a1;border-radius:8px}
</style>
</head>

<body>

<div class="header">
  <h1>مدارس الفلاح الأهلية</h1>
  <h2>إعداد المواد ونوع الاختبار</h2>
</div>

<div class="container">

<!-- 🔥 نوع الاختبار -->
<div class="box">
  <h3>نوع الاختبار العام</h3>

  <div class="row">

    <div class="col-6">
      <label>اختر نوع العرض</label>

      <!-- 🔥 هنا التعديل -->
      <select id="exam_type_input">
        <option value="term1">الفترة الأولى</option>
        <option value="term2">الفترة الثانية</option>
        <option value="quiz">الاختبارات الدورية</option>
      </select>
    </div>

    <div class="col-3" style="display:flex;align-items:flex-end">
      <button class="btn-primary" style="width:100%" onclick="saveExamType()">حفظ</button>
    </div>

    <div class="col-3" style="display:flex;align-items:flex-end">
      <span id="current_exam_label" class="badge" style="width:100%;text-align:center">—</span>
    </div>

  </div>
</div>

<!-- باقي الصفحة زي ما هي بدون تغيير -->
<div class="box">
  <h3>إعداد المواد</h3>

  <select id="grade_select"></select>

  <button class="btn-secondary" onclick="loadSubjects()">تحميل المواد</button>
  <button class="btn-primary" onclick="addRow()">إضافة مادة</button>

  <table>
    <thead>
      <tr>
        <th>المادة</th>
        <th>الدرجة النهائية</th>
        <th>حذف</th>
      </tr>
    </thead>
    <tbody id="subjects_body"></tbody>
  </table>

  <button class="btn-primary" onclick="saveSubjects()">حفظ</button>
</div>

</div>

<script>
var firebaseConfig={
  apiKey:"AIzaSyAfgSV-6_IMkXncgPWxY69omKfvFtGakgk",
  authDomain:"results2026-7c0dd.firebaseapp.com",
  projectId:"results2026-7c0dd"
};

firebase.initializeApp(firebaseConfig);
var db=firebase.firestore();

/* 🔥 ترجمة العرض */
let examMap={
  term1:"الفترة الأولى",
  term2:"الفترة الثانية",
  quiz:"الاختبارات الدورية"
};

async function loadExamType(){

  let d=await db.collection("settings").doc("general").get();

  if(d.exists){
    let val=d.data().examType || "term1";

    document.getElementById("exam_type_input").value = val;
    document.getElementById("current_exam_label").innerText = examMap[val];
  }
}

async function saveExamType(){

  let val=document.getElementById("exam_type_input").value;

  await db.collection("settings").doc("general").set({
    examType: val
  },{merge:true});

  document.getElementById("current_exam_label").innerText = examMap[val];

  alert("تم حفظ الإعداد");
}

loadExamType();
</script>

</body>
</html>
